<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>文件浏览器测试</title>
    <link href="css/bootstrap.min.css" rel="stylesheet" />
    <link href="css/bootstrap-icons.css" rel="stylesheet" />
    <style>
      body {
        padding: 2rem;
        background: #f8f9fa;
      }
      .test-container {
        max-width: 800px;
        margin: 0 auto;
        background: white;
        border-radius: 10px;
        padding: 2rem;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      }
      .file-explorer-test {
        border: 1px solid #dee2e6;
        border-radius: 8px;
        padding: 1rem;
        margin: 1rem 0;
      }
    </style>
  </head>
  <body>
    <div class="test-container">
      <h2><i class="bi bi-folder2-open"></i> 文件浏览器功能测试</h2>

      <div class="alert alert-info">
        <h5>功能说明：</h5>
        <ul>
          <li>支持选择本地文件夹</li>
          <li>显示文件树结构</li>
          <li>保存项目信息到浏览器存储</li>
          <li>显示最近项目列表</li>
          <li>强制刷新时清理数据</li>
        </ul>
      </div>

      <div class="file-explorer-test">
        <h5>存储管理器测试</h5>
        <div class="mb-3">
          <button class="btn btn-primary" onclick="testStorage()">
            测试存储功能
          </button>
          <button class="btn btn-secondary" onclick="clearStorage()">
            清理存储
          </button>
          <button class="btn btn-info" onclick="showStorageInfo()">
            显示存储信息
          </button>
        </div>
        <div id="storageTestResult"></div>
      </div>

      <div class="file-explorer-test">
        <h5>文件浏览器组件测试</h5>
        <div id="fileExplorerTest"></div>
      </div>

      <div class="mt-4">
        <a href="index.html" class="btn btn-outline-primary">
          <i class="bi bi-house"></i> 返回首页
        </a>
      </div>
    </div>

    <script src="js/core/StorageManager.js"></script>
    <script src="js/components/FileExplorer.js"></script>
    <script>
      let storageManager;
      let fileExplorer;

      // 页面加载完成后初始化
      document.addEventListener("DOMContentLoaded", function () {
        storageManager = new StorageManager();
        fileExplorer = new FileExplorer("fileExplorerTest");
      });

      function testStorage() {
        const result = document.getElementById("storageTestResult");

        // 测试保存项目信息
        const projectInfo = {
          name: "测试项目",
          path: "/test/path",
          lastOpened: new Date().toISOString(),
          isOpen: true,
        };

        storageManager.setProjectInfo(projectInfo);

        // 测试保存文件路径
        const filePaths = [
          { name: "src", type: "directory", children: [] },
          { name: "README.md", type: "file", size: 1024 },
        ];

        storageManager.setFilePaths(filePaths);

        result.innerHTML = `
                <div class="alert alert-success">
                    <h6>存储测试成功！</h6>
                    <p>已保存项目信息：${projectInfo.name}</p>
                    <p>已保存文件路径：${filePaths.length} 个</p>
                </div>
            `;
      }

      function clearStorage() {
        storageManager.clearAllData();
        document.getElementById("storageTestResult").innerHTML = `
                <div class="alert alert-warning">
                    存储数据已清理
                </div>
            `;
      }

      function showStorageInfo() {
        const projectInfo = storageManager.getProjectInfo();
        const filePaths = storageManager.getFilePaths();
        const recentProjects = storageManager.getRecentProjects();
        const userPreferences = storageManager.getUserPreferences();

        document.getElementById("storageTestResult").innerHTML = `
                <div class="alert alert-info">
                    <h6>存储信息：</h6>
                    <p><strong>项目信息：</strong> ${
                      projectInfo ? JSON.stringify(projectInfo, null, 2) : "无"
                    }</p>
                    <p><strong>文件路径：</strong> ${filePaths.length} 个</p>
                    <p><strong>最近项目：</strong> ${
                      recentProjects.length
                    } 个</p>
                    <p><strong>用户偏好：</strong> ${JSON.stringify(
                      userPreferences,
                      null,
                      2,
                    )}</p>
                </div>
            `;
      }
    </script>
  </body>
</html>
