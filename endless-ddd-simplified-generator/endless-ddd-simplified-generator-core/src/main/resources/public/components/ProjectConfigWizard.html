<!-- 项目配置向导组件 -->
<div id="projectConfigWizard" class="wizard-step">
    <div class="step-indicator">
        <div class="step active" data-step="1">
            <i class="bi bi-1-circle"></i>
        </div>
        <div class="step" data-step="2">
            <i class="bi bi-2-circle"></i>
        </div>
        <div class="step" data-step="3">
            <i class="bi bi-3-circle"></i>
        </div>
        <div class="step" data-step="4">
            <i class="bi bi-4-circle"></i>
        </div>
    </div>

    <!-- 步骤1：项目基本信息 -->
    <div class="wizard-step active" id="step1">
        <div class="config-section">
            <h3><i class="bi bi-info-circle"></i> 项目基本信息</h3>
            <div class="row">
                <div class="col-md-6">
                    <div class="form-floating mb-3">
                        <input class="form-control" id="projectArtifactIdInput" placeholder="项目构件ID" type="text">
                        <label for="projectArtifactIdInput">项目构件ID</label>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="form-floating mb-3">
                        <input class="form-control" id="groupIdInput" placeholder="组织ID" type="text">
                        <label for="groupIdInput">组织ID</label>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-md-6">
                    <div class="form-floating mb-3">
                        <input class="form-control" id="projectNameInput" placeholder="项目名称" type="text">
                        <label for="projectNameInput">项目名称</label>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="form-floating mb-3">
                        <input class="form-control" id="projectVersionInput" placeholder="项目版本" type="text" value="1.0.0">
                        <label for="projectVersionInput">项目版本</label>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-md-6">
                    <div class="form-floating mb-3">
                        <input class="form-control" id="projectAuthorInput" placeholder="项目作者" type="text">
                        <label for="projectAuthorInput">项目作者</label>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="form-floating mb-3">
                        <input class="form-control" id="rootPathInput" placeholder="项目根路径" type="text">
                        <label for="rootPathInput">项目根路径</label>
                    </div>
                </div>
            </div>
            <div class="form-floating mb-3">
                <textarea class="form-control" id="projectDescriptionInput" placeholder="项目描述" rows="3"></textarea>
                <label for="projectDescriptionInput">项目描述</label>
            </div>
            <div class="form-floating mb-3">
                <input class="form-control" id="basePackageInput" placeholder="项目基础包名" type="text">
                <label for="basePackageInput">项目基础包名</label>
            </div>
        </div>
    </div>

    <!-- 步骤2：技术栈配置 -->
    <div class="wizard-step" id="step2">
        <div class="config-section">
            <h3><i class="bi bi-gear"></i> 技术栈配置</h3>
            <div class="row">
                <div class="col-md-4">
                    <h5>Java版本</h5>
                    <div class="form-check">
                        <input class="form-check-input" id="java8Radio" type="radio" name="javaVersion" value="JAVA_8">
                        <label class="form-check-label" for="java8Radio">Java 8</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" id="java11Radio" type="radio" name="javaVersion" value="JAVA_11" checked>
                        <label class="form-check-label" for="java11Radio">Java 11</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" id="java17Radio" type="radio" name="javaVersion" value="JAVA_17">
                        <label class="form-check-label" for="java17Radio">Java 17</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" id="java21Radio" type="radio" name="javaVersion" value="JAVA_21">
                        <label class="form-check-label" for="java21Radio">Java 21</label>
                    </div>
                </div>
                <div class="col-md-4">
                    <h5>日志框架</h5>
                    <div class="form-check">
                        <input class="form-check-input" id="logbackRadio" type="radio" name="loggingFramework" value="LOGBACK" checked>
                        <label class="form-check-label" for="logbackRadio">Logback</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" id="log4j2Radio" type="radio" name="loggingFramework" value="LOG4J2">
                        <label class="form-check-label" for="log4j2Radio">Log4j2</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" id="log4jRadio" type="radio" name="loggingFramework" value="LOG4J">
                        <label class="form-check-label" for="log4jRadio">Log4j</label>
                    </div>
                </div>
                <div class="col-md-4">
                    <h5>持久化框架</h5>
                    <div class="form-check">
                        <input class="form-check-input" id="mybatisPlusRadio" type="radio" name="persistenceFramework" value="MYBATIS_PLUS" checked>
                        <label class="form-check-label" for="mybatisPlusRadio">MyBatis Plus</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" id="mybatisRadio" type="radio" name="persistenceFramework" value="MYBATIS">
                        <label class="form-check-label" for="mybatisRadio">MyBatis</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" id="jpaRadio" type="radio" name="persistenceFramework" value="JPA">
                        <label class="form-check-label" for="jpaRadio">JPA</label>
                    </div>
                </div>
            </div>
            <div class="row mt-3">
                <div class="col-md-6">
                    <h5>Spring Doc</h5>
                    <div class="form-check">
                        <input class="form-check-input" id="enableSpringDocCheckbox" type="checkbox" checked>
                        <label class="form-check-label" for="enableSpringDocCheckbox">启用Spring Doc</label>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 步骤3：服务配置 -->
    <div class="wizard-step" id="step3">
        <div class="config-section">
            <h3><i class="bi bi-server"></i> 服务配置</h3>
            <div class="row">
                <div class="col-md-12">
                    <h5>服务构件ID列表</h5>
                    <div id="serviceArtifactIdsContainer">
                        <div class="input-group mb-2">
                            <input class="form-control" type="text" placeholder="输入服务构件ID">
                            <button class="btn btn-outline-danger" type="button" onclick="ProjectConfigWizard.removeServiceArtifactId(this)">
                                <i class="bi bi-trash"></i>
                            </button>
                        </div>
                    </div>
                    <button class="btn btn-outline-primary btn-sm" type="button" onclick="ProjectConfigWizard.addServiceArtifactId()">
                        <i class="bi bi-plus"></i> 添加服务构件ID
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 步骤4：确认配置 -->
    <div class="wizard-step" id="step4">
        <div class="config-section">
            <h3><i class="bi bi-check-circle"></i> 确认配置</h3>
            <div class="row">
                <div class="col-md-12">
                    <div class="card">
                        <div class="card-body">
                            <h5 class="card-title">项目配置摘要</h5>
                            <div id="configSummary">
                                <!-- 配置摘要将通过JavaScript动态生成 -->
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 向导按钮 -->
    <div class="d-flex justify-content-between mt-4">
        <button class="btn btn-secondary" id="prevStepButton" onclick="ProjectConfigWizard.previousStep()" style="display: none;">
            <i class="bi bi-arrow-left"></i> 上一步
        </button>
        <button class="btn btn-primary" id="nextStepButton" onclick="ProjectConfigWizard.nextStep()">
            下一步 <i class="bi bi-arrow-right"></i>
        </button>
        <button class="btn btn-success" id="finishWizardButton" onclick="ProjectConfigWizard.finish()" style="display: none;">
            <i class="bi bi-check-circle"></i> 完成配置
        </button>
    </div>
</div>

<script>
// 添加服务构件ID
function addServiceArtifactId() {
    ProjectConfigWizard.addServiceArtifactId();
}

// 移除服务构件ID
function removeServiceArtifactId(button) {
    ProjectConfigWizard.removeServiceArtifactId(button);
}
</script>
