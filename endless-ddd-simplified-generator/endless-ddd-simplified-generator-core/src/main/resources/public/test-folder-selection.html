<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>文件夹选择功能测试</title>
    <link href="css/bootstrap.min.css" rel="stylesheet" />
    <link href="css/bootstrap-icons.css" rel="stylesheet" />
    <style>
      body {
        padding: 2rem;
        background: #f8f9fa;
      }
      .test-container {
        max-width: 600px;
        margin: 0 auto;
        background: white;
        border-radius: 10px;
        padding: 2rem;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      }
      .folder-selection-test {
        border: 1px solid #dee2e6;
        border-radius: 8px;
        padding: 1rem;
        margin: 1rem 0;
      }

      /* 路径输入框样式 */
      .input-group .form-control {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .input-group .form-control:focus {
        overflow: visible;
        white-space: normal;
        word-break: break-all;
      }

      /* 文件夹选择器样式 */
      .folder-selector-group {
        position: relative;
        cursor: pointer;
      }

      .folder-selector-group:hover {
        box-shadow: 0 0 0 0.2rem rgba(59, 130, 246, 0.25);
        border-radius: 0.375rem;
      }

      .folder-input {
        cursor: pointer;
        background-color: #fff;
        border-right: none;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        transition: all 0.2s ease;
      }

      .folder-input:hover {
        background-color: #f8f9fa;
      }

      .folder-input:focus {
        overflow: visible;
        white-space: normal;
        word-break: break-all;
        background-color: #fff;
        box-shadow: none;
      }

      .folder-select-btn {
        border-left: none;
        background-color: #fff;
        color: #6c757d;
        transition: all 0.2s ease;
        min-width: 50px;
        width: 50px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .folder-select-btn:hover {
        background-color: #6c757d;
        border-color: #6c757d;
        color: white;
      }

      .folder-select-btn:focus {
        box-shadow: none;
      }

      .folder-selector-group:hover .folder-input {
        border-color: #6c757d;
      }

      .folder-selector-group:hover .folder-select-btn {
        border-color: #6c757d;
      }

      /* 路径显示优化 */
      .folder-input:not(:focus) {
        text-overflow: ellipsis;
        overflow: hidden;
      }

      .folder-input:focus {
        text-overflow: clip;
        overflow: visible;
        white-space: normal;
        word-break: break-all;
        min-height: auto;
        height: auto;
      }
    </style>
  </head>
  <body>
    <div class="test-container">
      <h2><i class="bi bi-folder2-open"></i> 文件夹选择功能测试</h2>

      <div class="alert alert-info">
        <h5>功能说明：</h5>
        <ul>
          <li>支持现代浏览器的 File System Access API</li>
          <li>降级支持传统文件输入方式</li>
          <li>自动保存选择的路径到浏览器存储</li>
          <li>页面刷新后自动恢复上次选择的路径</li>
        </ul>
      </div>

      <div class="folder-selection-test">
        <h5>项目根路径选择测试</h5>
        <div class="form-floating">
          <div class="input-group folder-selector-group">
            <input
              class="form-control folder-input"
              id="rootPath"
              placeholder="项目根路径"
              type="text"
              readonly />
            <button
              class="btn btn-outline-secondary folder-select-btn"
              type="button"
              id="selectFolderBtn">
              <i class="bi bi-folder2-open"></i>
            </button>
          </div>
          <label for="rootPath">项目根路径 *</label>
        </div>
        <div class="form-text">
          <i class="bi bi-info-circle"></i> 点击输入框或文件夹图标选择项目根目录
        </div>
      </div>

      <div class="folder-selection-test">
        <h5>存储信息</h5>
        <div class="mb-3">
          <button class="btn btn-primary" onclick="showStorageInfo()">
            显示存储信息
          </button>
          <button class="btn btn-secondary" onclick="clearStorage()">
            清理存储
          </button>
        </div>
        <div id="storageInfo"></div>
      </div>

      <div class="mt-4">
        <a href="index.html" class="btn btn-outline-primary">
          <i class="bi bi-house"></i> 返回首页
        </a>
      </div>
    </div>

    <script src="js/core/StorageManager.js"></script>
    <script src="js/core/AlertManager.js"></script>
    <script>
      let storageManager;
      let alertManager;

      // 页面加载完成后初始化
      document.addEventListener("DOMContentLoaded", function () {
        storageManager = new StorageManager();
        alertManager = new AlertManager();

        // 设置文件夹选择功能
        setupFolderSelection();

        // 加载保存的路径
        loadSavedPath();
      });

      function setupFolderSelection() {
        const selectFolderBtn = document.getElementById("selectFolderBtn");
        const rootPathInput = document.getElementById("rootPath");

        if (selectFolderBtn) {
          selectFolderBtn.addEventListener("click", selectFolder);
        }

        // 让整个输入框都可以点击
        if (rootPathInput) {
          rootPathInput.addEventListener("click", selectFolder);
        }
      }

      async function selectFolder() {
        try {
          // 使用现代浏览器的 File System Access API
          if ("showDirectoryPicker" in window) {
            const dirHandle = await window.showDirectoryPicker({
              mode: "read",
            });

            await processSelectedFolder(dirHandle);
          } else {
            // 降级方案：使用传统文件输入
            showLegacyFolderInput();
          }
        } catch (error) {
          // 检查是否是用户取消操作
          if (error.name === "AbortError" || error.message.includes("cancel")) {
            console.log("用户取消了文件夹选择");
            return; // 用户取消，不显示错误信息
          }
          console.error("选择文件夹失败:", error);
          showError("选择文件夹失败: " + error.message);
        }
      }

      async function processSelectedFolder(dirHandle) {
        try {
          showLoading("正在处理文件夹...");

          // 获取完整的文件夹路径
          const fullPath = await getFullPath(dirHandle);
          const rootPathInput = document.getElementById("rootPath");

          // 设置路径到输入框
          rootPathInput.value = fullPath;

          // 保存到存储
          storageManager.setSessionData({
            selectedProjectPath: fullPath,
            lastSelectedAt: new Date().toISOString(),
          });

          hideLoading();
          showSuccess("文件夹选择成功");
        } catch (error) {
          console.error("处理文件夹失败:", error);
          hideLoading();
          showError("处理文件夹失败: " + error.message);
        }
      }

      async function getFullPath(dirHandle) {
        try {
          // 尝试获取完整路径
          const pathParts = [];
          let currentHandle = dirHandle;

          // 向上遍历获取完整路径
          while (currentHandle) {
            pathParts.unshift(currentHandle.name);
            try {
              currentHandle = await currentHandle.getParent();
            } catch (e) {
              // 到达根目录，停止遍历
              break;
            }
          }

          // 如果获取到了路径，返回完整路径
          if (pathParts.length > 0) {
            // 根据操作系统返回不同格式的路径
            if (navigator.platform.includes("Win")) {
              // Windows 系统使用反斜杠
              return pathParts.join("\\");
            } else {
              // Unix/Linux/Mac 系统使用正斜杠
              return pathParts.join("/");
            }
          }

          // 如果无法获取完整路径，至少返回文件夹名称
          return dirHandle.name;
        } catch (error) {
          console.warn("无法获取完整路径，使用文件夹名称:", error);
          return dirHandle.name;
        }
      }

      function showLegacyFolderInput() {
        const input = document.createElement("input");
        input.type = "file";
        input.webkitdirectory = true;
        input.multiple = true;

        input.addEventListener("change", (event) => {
          const files = event.target.files;
          if (files.length > 0) {
            processLegacyFolderSelection(files);
          }
        });

        input.click();
      }

      function processLegacyFolderSelection(files) {
        try {
          showLoading("正在处理文件夹...");

          const firstFile = files[0];
          // 获取完整的文件夹路径
          const fullPath = getLegacyFullPath(firstFile);
          const rootPathInput = document.getElementById("rootPath");

          // 设置路径到输入框
          rootPathInput.value = fullPath;

          // 保存到存储
          storageManager.setSessionData({
            selectedProjectPath: fullPath,
            lastSelectedAt: new Date().toISOString(),
          });

          hideLoading();
          showSuccess("文件夹选择成功");
        } catch (error) {
          console.error("处理文件夹失败:", error);
          hideLoading();
          showError("处理文件夹失败: " + error.message);
        }
      }

      function getLegacyFullPath(file) {
        try {
          // 从webkitRelativePath中提取完整路径
          const relativePath = file.webkitRelativePath;
          const pathParts = relativePath.split("/");

          // 移除文件名，只保留文件夹路径
          pathParts.pop();

          // 如果路径部分存在，返回完整路径
          if (pathParts.length > 0) {
            // 根据操作系统返回不同格式的路径
            if (navigator.platform.includes("Win")) {
              // Windows 系统使用反斜杠
              return pathParts.join("\\");
            } else {
              // Unix/Linux/Mac 系统使用正斜杠
              return pathParts.join("/");
            }
          }

          // 如果无法获取完整路径，返回文件夹名称
          return pathParts[0] || "selected-folder";
        } catch (error) {
          console.warn("无法获取完整路径，使用默认名称:", error);
          return "selected-folder";
        }
      }

      function loadSavedPath() {
        try {
          // 从存储中加载上次选择的路径
          const sessionData = storageManager.getSessionData();
          if (sessionData.selectedProjectPath) {
            const rootPathInput = document.getElementById("rootPath");
            rootPathInput.value = sessionData.selectedProjectPath;
          }
        } catch (error) {
          console.warn("无法加载保存的路径:", error);
        }
      }

      function showLoading(message) {
        const selectFolderBtn = document.getElementById("selectFolderBtn");
        if (selectFolderBtn) {
          const originalText = selectFolderBtn.innerHTML;
          selectFolderBtn.innerHTML =
            '<i class="bi bi-hourglass-split"></i> 处理中...';
          selectFolderBtn.disabled = true;
          selectFolderBtn._originalText = originalText;
        }
      }

      function hideLoading() {
        const selectFolderBtn = document.getElementById("selectFolderBtn");
        if (selectFolderBtn && selectFolderBtn._originalText) {
          selectFolderBtn.innerHTML = selectFolderBtn._originalText;
          selectFolderBtn.disabled = false;
          delete selectFolderBtn._originalText;
        }
      }

      function showSuccess(message) {
        alertManager.showSuccess(message);
      }

      function showError(message) {
        alertManager.showError(message);
      }

      function showStorageInfo() {
        const sessionData = storageManager.getSessionData();
        const projectInfo = storageManager.getProjectInfo();

        document.getElementById("storageInfo").innerHTML = `
                <div class="alert alert-info">
                    <h6>存储信息：</h6>
                    <p><strong>会话数据：</strong> ${JSON.stringify(
                      sessionData,
                      null,
                      2,
                    )}</p>
                    <p><strong>项目信息：</strong> ${JSON.stringify(
                      projectInfo,
                      null,
                      2,
                    )}</p>
                </div>
            `;
      }

      function clearStorage() {
        storageManager.clearAllData();
        document.getElementById("rootPath").value = "";
        document.getElementById("storageInfo").innerHTML = `
                <div class="alert alert-warning">
                    存储数据已清理
                </div>
            `;
      }
    </script>
  </body>
</html>
